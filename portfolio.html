<!DOCTYPE html>

<title>Galería | Raquel Blanco Fotografía</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400&family=Lora:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: "Lora", serif;
  background: #fff;
  color: #111;
}

/* MENÚ FIJO */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  background: #fff;
  padding: 18px 40px;
  display: flex;
  justify-content: space-between;
  border-bottom: 1px solid #eee;
  z-index: 1000;
}

nav a {
  margin-left: 30px;
  text-decoration: none;
  color: #111;
  font-size: 1rem;
}

nav a:hover { opacity: 0.6; }

h1, h2 {
  text-align: center;
  font-family: "Playfair Display", serif;
  font-weight: 300;
}

h1 {
  margin-top: 140px;
  font-size: 3rem;
}

h2 {
  margin-top: 80px;
  font-size: 2rem;
}

/* GALERÍA */
.galeria {
  max-width: 1300px;
  margin: 40px auto;
  padding: 20px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 25px;
}

.galeria img {
  width: 100%;
  border-radius: 4px;
  object-fit: cover;
}

/* RESPONSIVE */
@media (max-width: 900px) {
  .galeria {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (max-width: 600px) {
  .galeria {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
