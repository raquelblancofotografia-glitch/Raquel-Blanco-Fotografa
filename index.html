<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Raquel Blanco Robles | Fotografía Emocional</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400;500&family=Lora:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: "Lora", serif;
  color: #111;
  background: #fff;
  line-height: 1.7;
}

h1, h2 {
  font-family: "Playfair Display", serif;
  font-weight: 300;
}

/* MENÚ */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  background: #fff;
  padding: 18px 40px;
  display: flex;
  justify-content: space-between;
  border-bottom: 1px solid #eee;
  z-index: 1000;
}

nav a {
  margin-left: 30px;
  text-decoration: none;
  color: #111;
  font-size: 1rem;
}

nav a:hover { opacity: 0.6; }

/* HERO */
header {
  margin-top: 80px;
  position: relative;
  text-align: center;
}

.hero-img {
  width: 100%;
  height: 100vh;
  object-fit: cover;
}

.hero-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #fff;
}

.hero-text h1 {
  font-size: 3rem;
}

.hero-text p {
  font-size: 1.3rem;
}
